    <div class="contrainer-fluid">
      <div class="row row-cols-2 border border-1 border-secondary rounded p-2" style="margin-right: 6rem; margin-left: 6rem;">
        <div class="col-4">
          <ul class="ul-task-manager border-2 border-end">
            <li>
              test
            </li>
            <li class="text-del">
              test1
            </li>
          </ul>
        </div>
        <div class="col-8 align-self-center ps-0">
          <div class="progress mb-2">
            <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
              {{procentSuccesTask}} </div>
          </div>
          <p class="d-flex justify-content-center m-0">
            {{currentTask}}
          </p>
        </div>
        <div class="col-12 border-top border-2 d-flex justify-content-between align-items-center">
          <p> {{work.hoursPerDay}} </p>
          <p> {{work.hoursPerWeek}} </p>
          <p> {{work.hoursPerMounth}} </p>
        </div>
      </div>
    </div>
